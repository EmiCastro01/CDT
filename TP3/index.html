<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo CDT - Redes de Computadora</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #00ff00;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: rgba(15, 23, 42, 0.8);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3), inset 0 0 20px rgba(0, 255, 136, 0.1);
            border: 2px solid #00ff88;
        }
        h1 {
            color: #00ff88;
            text-align: center;
            font-size: 3em;
            text-shadow: 0 0 10px #00ff88;
            margin-bottom: 20px;
        }
        h2 {
            color: #00ccff;
            text-align: center;
            margin-top: 30px;
            text-shadow: 0 0 8px #00ccff;
        }
        .info {
            text-align: center;
            font-size: 1.2em;
            margin: 20px 0;
            color: #00ff88;
        }
        .integrantes {
            background-color: rgba(30, 41, 59, 0.6);
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            border: 1px solid #00ccff;
            box-shadow: 0 0 10px rgba(0, 204, 255, 0.2);
        }
        .integrantes h3 {
            color: #00ccff;
            margin-top: 0;
            text-shadow: 0 0 5px #00ccff;
        }
        .integrantes ul {
            list-style-type: none;
            padding-left: 0;
        }
        .integrantes li {
            padding: 8px 0;
            font-size: 1.1em;
            color: #00ff88;
        }
        .tipo-creativo {
            text-align: center;
            font-size: 1.3em;
            color: #ff00ff;
            font-weight: bold;
            margin-top: 30px;
            text-shadow: 0 0 8px #ff00ff;
        }
        .protocolos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .protocolo-card {
            background-color: rgba(30, 41, 59, 0.6);
            border: 2px solid #00ccff;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 204, 255, 0.3);
            transition: all 0.3s ease;
        }
        .protocolo-card:hover {
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.5);
            border-color: #00ff88;
            transform: translateY(-5px);
        }
        .protocolo-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }
        .protocolo-card h3 {
            color: #00ff88;
            margin-bottom: 10px;
            text-shadow: 0 0 5px #00ff88;
        }
        .protocolo-card p {
            color: #a0ff00;
            font-size: 0.95em;
            line-height: 1.5;
        }
        .section-title {
            color: #ff00ff;
            text-align: center;
            font-size: 1.8em;
            margin: 30px 0 20px 0;
            text-shadow: 0 0 8px #ff00ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>¡Hola Mundo!</h1>
        
        <div class="info">
            <h2>grupo CDT</h2>
            <p>De la materia Redes de Computadora</p>
        </div>

        <div class="integrantes">
            <h3>Integrantes:</h3>
            <ul>
                <li>Castillo Dario</li>
                <li>Castro Emiliano</li>
                <li>Martinez Priscila</li>
                <li>Arrieta Gabriel</li>
            </ul>
        </div>

        <div class>
            
        </div>
    </div>
</body>
</html>
